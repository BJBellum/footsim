<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <script>
      // SPA redirect: encode path into query param, redirect to base
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        '/footsim/?p=' + encodeURIComponent(l.pathname.replace('/footsim', '') + l.search) +
        (l.hash || '')
      );
    </script>
  </head>
  <body></body>
</html>
